on:
  push:
  pull_request:
    branches: [ master ]

jobs:

  test:

    name: ${{ matrix.lisp }}, ${{ matrix.lang_ext[0] }}, ${{ matrix.os }}

    strategy:
      matrix:
        lisp: [sbcl, ccl, acl, ecl, abcl]
        lang_ext: [[python, py], [bash, sh]]
        os: [ubuntu-latest, macos-15, macos-15-intel]
        exclude:
          - lisp: ccl
            os: macos-15
          - lisp: ecl
            os: macos-15
          - lisp: abcl
            os: macos-15
          - lisp: ccl
            os: macos-15-intel
          - lisp: ecl
            os: macos-15-intel
          - lisp: abcl
            os: macos-15-intel
          - lisp: acl
            os: macos-15-intel
          - lisp: acl
            lang_ext: [python, py]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:

    - uses: actions/checkout@v2

    - name: uname -a
      run: uname -a

    - name: Check $PATH
      run: echo $PATH

# February 2020:
# cl-travis issue - tput: No value for $TERM and no -T specified
# roswell issue - libcurl3 versions

    - name: Download implementation
      env:
        LISP: ${{ matrix.lisp }}
        OS:   ${{ matrix.os }}
        LANG: ${{ matrix.lang_ext[0] }}
        EXT:  ${{ matrix.lang_ext[1] }}
      run: |
        pwd
        ls -l
        $LANG --version
        $LANG <(curl -s https://raw.githubusercontent.com/digikar99/lisp-travis-lite/master/run.$EXT)


    - name: Run Lisp
      run: |
        echo $PATH
        cl --eval '(print "hello")'
        cl --eval '(this-will-error)' || echo $?
        cl --eval '(this-too' || echo $?
        cl --eval '(uiop:quit 0)'

    - name: Test quicklisp
      run: cl --eval '(ql:quickload "alexandria")'

    - name: Test clpm
      if: matrix.lang_ext[0] == 'python'
      run: cl --eval '(print (clpm-client:clpm-version))'
